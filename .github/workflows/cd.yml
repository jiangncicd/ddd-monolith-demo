name: CD

on:
  push:
    branches: [main]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: zulu      # Lombok 需 JDK 8，勿升级
          java-version: '8'
          cache: maven

      - name: Package
        run: mvn -B package -DskipTests

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
