name: PR Hygiene

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - synchronize
      - reopened
      - ready_for_review

permissions:
  pull-requests: read

concurrency:
  group: pr-hygiene-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hygiene:
    name: PR Metadata
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check PR metadata
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          python3 <<'PY'
          import os
          import re
          import sys

          title = os.environ.get("PR_TITLE") or ""
          body = os.environ.get("PR_BODY") or ""
          is_draft = os.environ.get("PR_DRAFT", "false").lower() == "true"

          if is_draft:
              print("Draft PR detected. Hygiene checks are skipped.")
              sys.exit(0)

          errors = []
          title_pattern = re.compile(r"^(feat|fix|docs|style|refactor|test|chore|ci)(\([a-z0-9-]+\))?:\s+.+")
          if not title_pattern.match(title):
              errors.append("PR title should use Conventional Commits, for example: feat(order): add order API.")

          if not re.search(r"^##\s+(Test Plan|测试计划)\s*$", body, re.IGNORECASE | re.MULTILINE):
              errors.append("PR body must contain a '## Test Plan' or '## 测试计划' section.")

          checked_items = re.findall(r"^\s*-\s+\[[xX]\]\s+.+$", body, re.MULTILINE)
          if not checked_items:
              errors.append("PR Test Plan must include at least one checked item.")

          if errors:
              print("PR hygiene failed:")
              for error in errors:
                  print(f"::error::{error}")
              sys.exit(1)

          print("PR hygiene passed.")
          PY
